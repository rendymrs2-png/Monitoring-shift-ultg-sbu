<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Shift PLN UPT Surabaya</title>
    <!-- Script Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .pln-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-premium { border-radius: 2.5rem; background: white; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .page-transition { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        .search-input {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .search-input:focus {
            border-color: #1e3a8a;
            background: white;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.08);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, getDocs, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, getAuth, signInAnonymously, onAuthStateChanged, getDocs, deleteDoc, doc, where };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAG60SGFpT5PSqT0dA_D5Nv4Bg8YvkoBqY",
            authDomain: "monitoring-shift.firebaseapp.com",
            projectId: "monitoring-shift",
            storageBucket: "monitoring-shift.firebasestorage.app",
            messagingSenderId: "365268810773",
            appId: "1:365268810773:web:b9e8bc456668b841c1e21c",
            measurementId: "G-0236XKWEKM"
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                image: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>,
                zap: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
                wa: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.8 8.38 8.38 0 0 1 3.8.9L21 4.5l-1 4.5 1 2.5z"></path></svg>,
                clock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
                search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
                lock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
                x: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [view, setView] = useState('form');
            const [logs, setLogs] = useState([]);
            const [onDuty, setOnDuty] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [showSettings, setShowSettings] = useState(false);
            
            // Password State
            const [passwordInput, setPasswordInput] = useState("");
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const ADMIN_PASSWORD = "PLN123";

            const [form, setForm] = useState({ lokasi: '', petugas: '', whatsapp: '', shift: '', foto: null });
            const fileRef = useRef(null);

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        startApp();
                    }
                }, 500);
            }, []);

            const cleanupOldLogs = async (db) => {
                const { collection, getDocs, deleteDoc, doc, Timestamp } = window.FB;
                try {
                    const now = new Date();
                    const fourteenDaysAgo = new Date(now);
                    fourteenDaysAgo.setDate(fourteenDaysAgo.getDate() - 14);
                    const oneDayAgo = new Date(now);
                    oneDayAgo.setDate(oneDayAgo.getDate() - 1);

                    const thresholdOld = Timestamp.fromDate(fourteenDaysAgo);
                    const thresholdSafe = Timestamp.fromDate(oneDayAgo);

                    const qSnap = await getDocs(collection(db, "shift_reports"));
                    qSnap.forEach(async (document) => {
                        const data = document.data();
                        const docTime = data.timestamp?.toMillis();
                        if (docTime < thresholdOld.toMillis() && docTime < thresholdSafe.toMillis()) {
                            await deleteDoc(doc(db, "shift_reports", document.id));
                        }
                    });
                } catch (e) { console.error("Auto Cleanup Error"); }
            };

            const handleManualCleanup = async () => {
                const { getFirestore, collection, getDocs, deleteDoc, doc, Timestamp } = window.FB;
                const db = getFirestore();
                setLoading(true);
                
                try {
                    const oneDayAgo = new Date();
                    oneDayAgo.setDate(oneDayAgo.getDate() - 1);
                    const thresholdSafe = Timestamp.fromDate(oneDayAgo);

                    const qSnap = await getDocs(collection(db, "shift_reports"));
                    let deletedCount = 0;

                    for (const document of qSnap.docs) {
                        const data = document.data();
                        const docTime = data.timestamp?.toMillis();
                        if (docTime < thresholdSafe.toMillis()) {
                            await deleteDoc(doc(db, "shift_reports", document.id));
                            deletedCount++;
                        }
                    }
                    alert(`Berhasil menghapus ${deletedCount} riwayat.`);
                    setShowSettings(false);
                    setIsAuthorized(false);
                    setPasswordInput("");
                } catch (e) {
                    alert("Gagal menghapus riwayat!");
                }
                setLoading(false);
            };

            const startApp = async () => {
                const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, collection, query, orderBy, onSnapshot } = window.FB;
                try {
                    const app = initializeApp(firebaseConfig);
                    const db = getFirestore(app);
                    const auth = getAuth(app);
                    
                    await signInAnonymously(auth);
                    cleanupOldLogs(db);

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            const q = query(collection(db, "shift_reports"), orderBy("timestamp", "desc"));
                            onSnapshot(q, (snap) => {
                                const allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                                setLogs(allData);
                                const uniqueGI = {};
                                allData.forEach(item => {
                                    if (!uniqueGI[item.lokasi]) uniqueGI[item.lokasi] = item;
                                });
                                setOnDuty(Object.values(uniqueGI));
                            });
                        }
                    });
                } catch (e) { console.error("FB Init Error"); }
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => setForm({...form, foto: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const submit = async () => {
                if (!form.lokasi || !form.petugas || !form.foto) return alert("Lengkapi data!");
                setLoading(true);
                try {
                    const { getFirestore, collection, addDoc, Timestamp } = window.FB;
                    const db = getFirestore();
                    await addDoc(collection(db, "shift_reports"), {
                        ...form,
                        lokasi: form.lokasi.toUpperCase().trim(),
                        petugas: form.petugas.toUpperCase().trim(),
                        timestamp: Timestamp.now()
                    });
                    setForm({ lokasi: '', petugas: '', whatsapp: '', shift: '', foto: null });
                    setView('active');
                } catch (e) { alert("Gagal kirim!"); }
                setLoading(false);
            };

            const handleAuth = () => {
                if(passwordInput === ADMIN_PASSWORD) {
                    setIsAuthorized(true);
                    setErrorMsg("");
                } else {
                    setErrorMsg("KATA SANDI SALAH!");
                    setPasswordInput("");
                    const input = document.getElementById("pw-input");
                    input.classList.add("animate-shake");
                    setTimeout(() => input.classList.remove("animate-shake"), 500);
                }
            };

            const filteredOnDuty = onDuty.filter(item => 
                item.petugas.toLowerCase().includes(searchTerm.toLowerCase()) || 
                item.lokasi.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const filteredLogs = logs.filter(item => 
                item.petugas.toLowerCase().includes(searchTerm.toLowerCase()) || 
                item.lokasi.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#f8fafc] flex flex-col relative overflow-x-hidden">
                    <header className="bg-white p-5 border-b-4 border-blue-900 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                             <div className="bg-[#F9D611] p-1.5 rounded shadow-sm border-b-2 border-yellow-600">
                                <Icon name="zap" className="text-red-600" />
                             </div>
                             <span className="font-black text-2xl text-blue-900 tracking-tighter">PLN</span>
                        </div>
                        <div className="text-right">
                            <h1 className="font-black text-blue-900 text-lg uppercase leading-none tracking-tight">UPT SURABAYA</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">ULTG SBU</p>
                        </div>
                    </header>

                    <nav className="flex bg-white mx-4 mt-6 p-1.5 rounded-full shadow-sm border border-slate-100">
                        <button onClick={() => { setView('form'); setSearchTerm(""); }} className={`flex-1 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${view === 'form' ? 'bg-blue-900 text-white shadow-lg' : 'text-slate-400'}`}>Lapor</button>
                        <button onClick={() => { setView('active'); setSearchTerm(""); }} className={`flex-1 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${view === 'active' ? 'bg-blue-900 text-white shadow-lg' : 'text-slate-400'}`}>Status</button>
                        <button onClick={() => { setView('logs'); setSearchTerm(""); }} className={`flex-1 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${view === 'logs' ? 'bg-blue-900 text-white shadow-lg' : 'text-slate-400'}`}>Log</button>
                    </nav>

                    {(view === 'active' || view === 'logs') && (
                        <div className="px-4 mt-4 page-transition">
                            <div className="relative group">
                                <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                                    <Icon name="search" size={16} className="text-slate-400 group-focus-within:text-blue-900" />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="CARI PETUGAS / GI..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full bg-slate-100/50 p-4 pl-12 rounded-2xl text-[10px] font-bold uppercase tracking-wider outline-none search-input"
                                />
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-4 pb-20">
                        {view === 'form' && (
                            <div className="card-premium p-8 space-y-5 page-transition">
                                <h2 className="text-xl font-black text-blue-900 uppercase tracking-tight">Input Laporan</h2>
                                <div className="space-y-4">
                                    <input placeholder="GARDU INDUK" value={form.lokasi} onChange={e=>setForm({...form, lokasi: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase text-sm outline-none focus:border-blue-500 transition-all" />
                                    <input placeholder="NAMA PETUGAS" value={form.petugas} onChange={e=>setForm({...form, petugas: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase text-sm outline-none focus:border-blue-500 transition-all" />
                                    <input placeholder="WHATSAPP (08...)" type="tel" value={form.whatsapp} onChange={e=>setForm({...form, whatsapp: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-blue-500 transition-all" />
                                    <div onClick={() => fileRef.current.click()} className="w-full h-44 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl flex items-center justify-center overflow-hidden cursor-pointer active:scale-95 transition-all">
                                        {form.foto ? <img src={form.foto} className="w-full h-full object-cover" /> : <div className="text-center"><Icon name="image" size={32} className="mx-auto text-slate-300" /><p className="text-[10px] font-black uppercase text-slate-400 mt-2">Lampirkan Foto</p></div>}
                                        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
                                    </div>
                                    <button onClick={submit} disabled={loading} className="w-full pln-gradient text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl active:scale-95 disabled:opacity-50 transition-all">
                                        {loading ? 'MENGIRIM...' : 'KIRIM LAPORAN'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'active' && (
                            <div className="space-y-4 page-transition">
                                <h2 className="font-black text-blue-900 text-xs uppercase tracking-widest px-2">On Duty {searchTerm && `(${filteredOnDuty.length})`}</h2>
                                {filteredOnDuty.length === 0 ? <p className="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Data tidak ditemukan</p> : filteredOnDuty.map(l => (
                                    <div key={l.id} className="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-100 flex gap-4 transition-all hover:shadow-md">
                                        <div className="w-20 h-20 rounded-2xl bg-slate-50 overflow-hidden flex-shrink-0 border border-slate-100">
                                            <img src={l.foto} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-1 min-w-0 flex flex-col justify-center">
                                            <p className="text-[7px] font-black text-white uppercase bg-blue-600 px-2 py-0.5 rounded w-fit mb-1">{l.lokasi}</p>
                                            <h3 className="font-black text-slate-800 uppercase truncate text-sm leading-tight">{l.petugas}</h3>
                                            <div className="flex items-center gap-2 mt-2">
                                                <a href={`https://wa.me/${l.whatsapp?.replace(/\D/g, '')}`} target="_blank" className="p-2 bg-green-500 text-white rounded-lg active:scale-90 transition-all">
                                                    <Icon name="wa" size={14} />
                                                </a>
                                                <div className="flex items-center gap-1 text-[8px] font-bold text-slate-400 uppercase tracking-tighter">
                                                    <Icon name="clock" size={10} /> {l.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} WIB
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'logs' && (
                            <div className="space-y-3 page-transition">
                                <h2 className="font-black text-blue-900 text-xs uppercase tracking-widest px-2">Riwayat Laporan</h2>
                                {filteredLogs.length === 0 ? <p className="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Riwayat tidak ditemukan</p> : filteredLogs.map(l => (
                                    <div key={l.id} className="bg-white/60 p-3 rounded-2xl border border-slate-100 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full overflow-hidden border border-white bg-slate-100">
                                                <img src={l.foto} className="w-full h-full object-cover" />
                                            </div>
                                            <div>
                                                <p className="text-[7px] font-black text-blue-900 uppercase">{l.lokasi}</p>
                                                <p className="font-bold text-[11px] text-slate-700 uppercase leading-none">{l.petugas}</p>
                                                <p className="text-[7px] text-slate-400 font-medium italic mt-0.5">{l.timestamp?.toDate().toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Floating Settings Button - Pojok Kanan Bawah */}
                    <button 
                        onClick={() => { setShowSettings(true); setPasswordInput(""); setErrorMsg(""); }}
                        className="fixed bottom-6 right-6 w-14 h-14 pln-gradient text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all z-[60]"
                    >
                        <Icon name="settings" size={24} />
                    </button>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 page-transition">
                            <div className="absolute inset-0 bg-blue-900/40 backdrop-blur-sm" onClick={() => setShowSettings(false)}></div>
                            <div className="relative w-full max-w-sm bg-white rounded-[2.5rem] p-8 shadow-2xl overflow-hidden border border-slate-200">
                                <div className="flex justify-between items-start mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-blue-50 text-blue-900 rounded-xl">
                                            <Icon name="settings" size={20} />
                                        </div>
                                        <h2 className="text-lg font-black text-blue-900 uppercase tracking-tight">Pengaturan</h2>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>

                                {!isAuthorized ? (
                                    <div className="space-y-4">
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Otoritas Admin</p>
                                            <div className="relative">
                                                <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-300">
                                                    <Icon name="lock" size={16} />
                                                </div>
                                                <input 
                                                    id="pw-input"
                                                    type="password" 
                                                    placeholder="MASUKKAN KATA SANDI..." 
                                                    value={passwordInput}
                                                    onChange={(e) => setPasswordInput(e.target.value)}
                                                    className={`w-full p-4 pl-12 bg-slate-50 border-2 rounded-2xl font-bold text-sm outline-none transition-all ${errorMsg ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 focus:border-blue-500'}`}
                                                />
                                            </div>
                                            {errorMsg && <p className="text-red-500 text-[9px] font-black mt-2 text-center tracking-widest">{errorMsg}</p>}
                                        </div>
                                        <button 
                                            onClick={handleAuth}
                                            className="w-full bg-blue-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95"
                                        >
                                            BUKA AKSES
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="p-5 bg-red-50 rounded-3xl border border-red-100 text-center">
                                            <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <Icon name="trash" size={20} />
                                            </div>
                                            <h3 className="font-black text-red-600 text-[10px] uppercase tracking-widest mb-2">Hapus Semua Riwayat</h3>
                                            <p className="text-[9px] text-red-400 font-bold mb-5 uppercase leading-relaxed tracking-tight">
                                                Data dalam 24 jam terakhir tidak akan dihapus demi pemantauan harian.
                                            </p>
                                            <button 
                                                onClick={handleManualCleanup}
                                                disabled={loading}
                                                className="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 disabled:opacity-50"
                                            >
                                                {loading ? "MENGHAPUS..." : "KONFIRMASI HAPUS"}
                                            </button>
                                        </div>
                                        <button 
                                            onClick={() => { setIsAuthorized(false); setPasswordInput(""); }}
                                            className="w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest active:scale-95"
                                        >
                                            KELUAR ADMIN
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="text-center py-4 absolute bottom-0 w-full">
                        <p className="text-[8px] font-black text-slate-300 uppercase tracking-widest">Data 24 Jam Terakhir Tetap Tersimpan</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
