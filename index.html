<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Shift PLN UPT Surabaya</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .pln-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, getAuth, signInAnonymously };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Menggunakan konfigurasi terbaru yang Anda berikan
        const firebaseConfig = {
            apiKey: "AIzaSyAG60SGFpT5PSqT0dA_D5Nv4Bg8YvkoBqY",
            authDomain: "monitoring-shift.firebaseapp.com",
            projectId: "monitoring-shift",
            storageBucket: "monitoring-shift.firebasestorage.app",
            messagingSenderId: "365268810773",
            appId: "1:365268810773:web:b805efeaf286169fc1e21c",
            measurementId: "G-SN2RGFBC0Y"
        };

        function App() {
            const [view, setView] = useState('form');
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [form, setForm] = useState({ lokasi: '', petugas: '', shift: 'Pagi', foto: null });
            const fileRef = useRef(null);

            useEffect(() => {
                const app = FB.initializeApp(firebaseConfig);
                const auth = FB.getAuth(app);
                const db = FB.getFirestore(app);
                
                FB.signInAnonymously(auth);
                
                const q = FB.query(FB.collection(db, "shift_reports_final"), FB.orderBy("timestamp", "desc"));
                const unsubscribe = FB.onSnapshot(q, (snap) => {
                    setLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubscribe();
            }, []);

            const submit = async () => {
                if (!form.lokasi || !form.petugas || !form.foto) return alert("Lengkapi data dan foto!");
                setLoading(true);
                try {
                    const db = FB.getFirestore();
                    await FB.addDoc(FB.collection(db, "shift_reports_final"), {
                        ...form,
                        lokasi: form.lokasi.toUpperCase(),
                        petugas: form.petugas.toUpperCase(),
                        timestamp: FB.Timestamp.now()
                    });
                    setForm({ lokasi: '', petugas: '', shift: 'Pagi', foto: null });
                    setView('logs');
                } catch (e) {
                    alert("Gagal Kirim! Pastikan Firestore Rules sudah di-Publish ke mode 'allow read, write: if true;'");
                }
                setLoading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col">
                    <header className="bg-white p-5 border-b-4 border-blue-900 flex justify-between items-center sticky top-0 z-20 shadow-sm">
                        <div className="flex items-center gap-2">
                             <div className="bg-yellow-400 p-1 rounded font-black italic text-blue-900 text-lg">PLN</div>
                             <span className="font-extrabold text-blue-900 tracking-tighter text-lg uppercase">UPT Surabaya</span>
                        </div>
                    </header>

                    <nav className="flex p-4 gap-2 bg-slate-50/80 backdrop-blur-md sticky top-[72px] z-10">
                        <button onClick={() => setView('form')} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === 'form' ? 'bg-blue-900 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}>Input Laporan</button>
                        <button onClick={() => setView('logs')} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${view === 'logs' ? 'bg-blue-900 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}>Riwayat Log</button>
                    </nav>

                    <main className="p-4 flex-1">
                        {view === 'form' ? (
                            <div className="bg-white rounded-[2.5rem] p-7 space-y-5 card-shadow border border-slate-50">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Nama Gardu Induk</label>
                                    <input placeholder="CONTOH: GI WARU" value={form.lokasi} onChange={e=>setForm({...form, lokasi: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100 focus:border-blue-500 transition-all text-sm" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Nama Petugas</label>
                                    <input placeholder="NAMA LENGKAP" value={form.petugas} onChange={e=>setForm({...form, petugas: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100 focus:border-blue-500 transition-all text-sm" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Shift Dinas</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Pagi', 'Sore', 'Malam'].map(s => (
                                            <button key={s} onClick={()=>setForm({...form, shift: s})} className={`py-3 rounded-xl font-black text-[10px] uppercase ${form.shift === s ? 'bg-blue-900 text-white' : 'bg-slate-50 text-slate-400'}`}>{s}</button>
                                        ))}
                                    </div>
                                </div>
                                <div onClick={() => fileRef.current.click()} className="h-48 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2rem] flex items-center justify-center overflow-hidden cursor-pointer hover:bg-slate-100 transition-all">
                                    {form.foto ? <img src={form.foto} className="w-full h-full object-cover" /> : <div className="text-center text-slate-300"><p className="text-[10px] font-black uppercase tracking-widest">Klik Ambil Foto Dokumentasi</p></div>}
                                    <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e => {
                                        const reader = new FileReader();
                                        reader.onload = () => setForm({...form, foto: reader.result});
                                        reader.readAsDataURL(e.target.files[0]);
                                    }} />
                                </div>
                                <button onClick={submit} disabled={loading} className={`w-full pln-gradient text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl transition-all ${loading ? 'opacity-50 animate-pulse' : 'active:scale-95'}`}>
                                    {loading ? 'Sedang Mengirim...' : 'Kirim Laporan Sekarang'}
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {logs.length === 0 ? (
                                    <div className="text-center py-20 text-slate-300 font-black uppercase text-[10px] tracking-widest">Menunggu Data...</div>
                                ) : (
                                    logs.map(l => (
                                        <div key={l.id} className="bg-white p-4 rounded-[2rem] shadow-sm flex gap-4 border border-slate-100 items-center">
                                            <img src={l.foto} className="w-20 h-20 rounded-2xl object-cover border border-slate-50 shadow-inner" />
                                            <div className="flex-1 min-w-0">
                                                <div className="flex gap-1.5 mb-1.5">
                                                    <span className="text-[7px] font-black bg-blue-900 text-white px-2 py-0.5 rounded-full uppercase tracking-tighter">{l.lokasi}</span>
                                                    <span className="text-[7px] font-black bg-yellow-400 text-blue-900 px-2 py-0.5 rounded-full uppercase tracking-tighter">{l.shift}</span>
                                                </div>
                                                <h4 className="font-black text-slate-800 text-xs truncate uppercase tracking-tight">{l.petugas}</h4>
                                                <p className="text-[9px] text-slate-400 font-bold mt-1 uppercase italic tracking-tighter">{l.timestamp?.toDate().toLocaleString('id-ID')}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
