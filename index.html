<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Shift PLN UPT Surabaya</title>
    <!-- Script Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .pln-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-premium { border-radius: 2.5rem; background: white; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .page-transition { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, deleteDoc, doc, getDocs };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAG60SGFpT5PSqT0dA_D5Nv4Bg8YvkoBqY",
            authDomain: "monitoring-shift.firebaseapp.com",
            projectId: "monitoring-shift",
            storageBucket: "monitoring-shift.firebasestorage.app",
            messagingSenderId: "365268810773",
            appId: "1:365268810773:web:b9e8bc456668b841c1e21c"
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                image: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>,
                zap: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
                wa: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.8 8.38 8.38 0 0 1 3.8.9L21 4.5l-1 4.5 1 2.5z"></path></svg>,
                search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
                lock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                alert: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('form');
            const [logs, setLogs] = useState([]);
            const [onDuty, setOnDuty] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [errorPopup, setErrorPopup] = useState(null);
            
            const [passwordInput, setPasswordInput] = useState("");
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const ADMIN_PASSWORD = "PLN123";

            const [form, setForm] = useState({ 
                lokasi: '', 
                petugas: '', 
                whatsapp: '', 
                shift: 'Pagi', 
                shiftCustom: '',
                keterangan: '', 
                foto: null 
            });
            const fileRef = useRef(null);
            
            // App ID tetap sesuai Rules agar konsisten
            const appId = 'pln-shift-monitor-v2';

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged } = window.FB;
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) { console.error("Auth Error", e); }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) cleanOldData(); 
                });
                return () => unsubscribe();
            }, []);

            const cleanOldData = async () => {
                const { getFirestore, collection, getDocs, deleteDoc, doc } = window.FB;
                const db = getFirestore();
                const now = new Date();
                const duaMingguLalu = now.getTime() - (14 * 24 * 60 * 60 * 1000);

                try {
                    const qSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'shift_reports'));
                    qSnap.forEach(async (document) => {
                        const data = document.data();
                        if (data.timestamp && data.timestamp.toMillis() < duaMingguLalu) {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shift_reports', document.id));
                        }
                    });
                } catch (e) {
                    console.error("Auto Cleanup Error:", e);
                }
            };

            useEffect(() => {
                if (!user) return;
                const { getFirestore, collection, query, orderBy, onSnapshot } = window.FB;
                const db = getFirestore();
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'shift_reports'), orderBy("timestamp", "desc"));
                
                const unsubscribe = onSnapshot(q, (snap) => {
                    const allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLogs(allData);
                    
                    const uniqueGI = {};
                    allData.forEach(item => {
                        if (!uniqueGI[item.lokasi]) uniqueGI[item.lokasi] = item;
                    });
                    setOnDuty(Object.values(uniqueGI));
                }, (err) => {
                    console.error("Firestore Read Error:", err);
                    setErrorPopup("Gagal sinkronisasi data. Pastikan Rules di Firebase sudah di-Publish!");
                });

                return () => unsubscribe();
            }, [user]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) return setErrorPopup("Ukuran foto maksimal 2MB!");
                    const reader = new FileReader();
                    reader.onload = () => setForm({...form, foto: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const submit = async () => {
                if (!form.lokasi || !form.petugas || !form.foto) return setErrorPopup("Lengkapi Nama GI, Petugas, dan Foto!");
                
                const finalShift = form.shift === 'Lainnya' ? (form.shiftCustom || 'Lainnya') : form.shift;
                
                setLoading(true);
                try {
                    const { getFirestore, collection, addDoc, Timestamp } = window.FB;
                    const db = getFirestore();
                    if (!user) throw new Error("Sesi berakhir, silakan refresh.");

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shift_reports'), {
                        ...form,
                        shift: finalShift,
                        lokasi: form.lokasi.toUpperCase().trim(),
                        petugas: form.petugas.toUpperCase().trim(),
                        timestamp: Timestamp.now()
                    });
                    setForm({ lokasi: '', petugas: '', whatsapp: '', shift: 'Pagi', shiftCustom: '', keterangan: '', foto: null });
                    setView('active');
                } catch (e) { 
                    console.error("Submit Error:", e);
                    setErrorPopup(`Gagal kirim laporan. Pastikan kode Rules Firebase sudah benar dan di-Publish!`); 
                }
                setLoading(false);
            };

            const deleteLog = async (id) => {
                if (!isAuthorized) return setShowSettings(true);
                const { getFirestore, doc, deleteDoc } = window.FB;
                const db = getFirestore();
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shift_reports', id));
                } catch (e) { setErrorPopup("Gagal menghapus data."); }
            };

            const checkPassword = () => {
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAuthorized(true);
                    setShowSettings(false);
                    setPasswordInput("");
                } else {
                    setErrorPopup("Password Admin Salah!");
                }
            };

            const filterItems = (items) => {
                const search = searchTerm.toLowerCase();
                return items.filter(i => 
                    i.lokasi.toLowerCase().includes(search) || 
                    i.petugas.toLowerCase().includes(search) ||
                    (i.shift && i.shift.toLowerCase().includes(search))
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#f8fafc] flex flex-col relative overflow-x-hidden text-slate-900">
                    <header className="bg-white p-5 border-b-4 border-blue-900 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                             <div className="bg-[#F9D611] p-1.5 rounded shadow-sm border-b-2 border-yellow-600">
                                <Icon name="zap" className="text-red-600" />
                             </div>
                             <span className="font-black text-2xl text-blue-900 tracking-tighter">PLN</span>
                        </div>
                        <div className="text-right">
                            <h1 className="font-black text-blue-900 text-lg uppercase tracking-tight leading-none">UPT SURABAYA</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">ULTG SBU</p>
                        </div>
                    </header>

                    <nav className="flex bg-white mx-4 mt-6 p-1.5 rounded-full shadow-sm border border-slate-100">
                        {['form', 'active', 'logs'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${view === v ? 'bg-blue-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                {v === 'form' ? 'Lapor' : v === 'active' ? 'Status' : 'Log'}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 p-4 pb-24">
                        {view === 'form' && (
                            <div className="card-premium p-6 space-y-5 page-transition">
                                <h2 className="text-xl font-black text-blue-900 uppercase">Laporan Shift Baru</h2>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <p className="text-[9px] font-black text-slate-400 uppercase ml-2">Lokasi Gardu Induk</p>
                                        <input 
                                            placeholder="CONTOH: GI WARU" 
                                            value={form.lokasi} 
                                            onChange={e=>setForm({...form, lokasi: e.target.value})} 
                                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase text-sm outline-none focus:border-blue-500" 
                                        />
                                    </div>

                                    <div className="space-y-1">
                                        <p className="text-[9px] font-black text-slate-400 uppercase ml-2">Nama Petugas</p>
                                        <input placeholder="NAMA LENGKAP" value={form.petugas} onChange={e=>setForm({...form, petugas: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase text-sm outline-none focus:border-blue-500" />
                                    </div>
                                    
                                    <div className="space-y-1">
                                        <p className="text-[9px] font-black text-slate-400 uppercase ml-2">Pilih Shift</p>
                                        <div className="flex flex-wrap gap-2">
                                            {['Pagi', 'Sore', 'Malam', 'Lainnya'].map(s => (
                                                <button key={s} onClick={()=>setForm({...form, shift: s})} className={`flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black uppercase transition-all ${form.shift === s ? 'bg-blue-900 text-white shadow-md' : 'bg-slate-50 text-slate-400 border-2 border-slate-100'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {form.shift === 'Lainnya' && (
                                        <input placeholder="MASUKKAN NAMA SHIFT" value={form.shiftCustom} onChange={e=>setForm({...form, shiftCustom: e.target.value})} className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-bold uppercase text-sm outline-none animate-pulse" />
                                    )}

                                    <div className="space-y-1">
                                        <p className="text-[9px] font-black text-slate-400 uppercase ml-2">Keterangan Tambahan</p>
                                        <textarea placeholder="CATATAN PEKERJAAN" value={form.keterangan} onChange={e=>setForm({...form, keterangan: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase text-sm outline-none h-24" />
                                    </div>

                                    <div className="space-y-1">
                                        <p className="text-[9px] font-black text-slate-400 uppercase ml-2">Nomor WhatsApp Petugas</p>
                                        <input placeholder="08123456xxxx" type="tel" value={form.whatsapp} onChange={e=>setForm({...form, whatsapp: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none" />
                                    </div>

                                    <div onClick={() => fileRef.current.click()} className="w-full h-48 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl flex items-center justify-center overflow-hidden cursor-pointer active:scale-95 transition-all">
                                        {form.foto ? <img src={form.foto} className="w-full h-full object-cover" /> : <div className="text-center"><Icon name="image" size={32} className="mx-auto text-slate-300" /><p className="text-[10px] font-black uppercase text-slate-400 mt-2">Ambil Foto Dokumentasi</p></div>}
                                        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
                                    </div>

                                    <button onClick={submit} disabled={loading} className={`w-full text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl active:scale-95 transition-all ${loading ? 'bg-slate-400 animate-pulse' : 'pln-gradient'}`}>
                                        {loading ? 'PROSES MENGIRIM...' : 'KIRIM LAPORAN SEKARANG'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {(view === 'active' || view === 'logs') && (
                            <div className="space-y-4 page-transition">
                                <div className="relative">
                                    <Icon name="search" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input placeholder="CARI GI, PETUGAS, ATAU SHIFT..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full bg-white p-4 pl-12 rounded-2xl text-[10px] font-bold uppercase outline-none border border-slate-100 shadow-sm" />
                                </div>
                                
                                {filterItems(view === 'active' ? onDuty : logs).length === 0 ? (
                                    <div className="text-center py-20">
                                        <Icon name="alert" size={40} className="mx-auto text-slate-200" />
                                        <p className="text-[10px] font-black text-slate-300 uppercase mt-4">Data Tidak Ditemukan</p>
                                    </div>
                                ) : (
                                    filterItems(view === 'active' ? onDuty : logs).map(l => (
                                        <div key={l.id} className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 mb-4 relative overflow-hidden group">
                                            <div className="flex gap-4 items-start">
                                                <div className="w-20 h-20 rounded-2xl overflow-hidden border-2 border-slate-50 flex-shrink-0">
                                                    <img src={l.foto} className="w-full h-full object-cover" />
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex flex-wrap gap-1.5 mb-1.5">
                                                        <span className="text-[7px] font-black bg-blue-600 text-white px-2 py-0.5 rounded-full uppercase tracking-tighter">{l.lokasi}</span>
                                                        <span className="text-[7px] font-black bg-yellow-400 text-blue-900 px-2 py-0.5 rounded-full uppercase tracking-tighter">{l.shift}</span>
                                                    </div>
                                                    <h3 className="font-black text-slate-800 uppercase text-xs truncate leading-tight">{l.petugas}</h3>
                                                    <p className="text-[8px] text-slate-400 font-bold uppercase mt-0.5 tracking-tighter italic">{l.timestamp?.toDate().toLocaleString('id-ID')}</p>
                                                    {l.keterangan && (
                                                        <p className="text-[9px] text-slate-500 font-medium bg-slate-50 p-2 rounded-lg mt-2 line-clamp-2 uppercase leading-snug">{l.keterangan}</p>
                                                    )}
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    {l.whatsapp && (
                                                        <a href={`https://wa.me/${l.whatsapp.replace(/^0/, '62')}`} target="_blank" className="p-2.5 bg-green-50 text-green-600 rounded-xl active:scale-90 transition-all border border-green-100">
                                                            <Icon name="wa" size={16} />
                                                        </a>
                                                    )}
                                                    {isAuthorized && (
                                                        <button onClick={() => deleteLog(l.id)} className="p-2.5 bg-red-50 text-red-600 rounded-xl active:scale-90 transition-all border border-red-100">
                                                            <Icon name="trash" size={16} />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                                
                                <button onClick={()=>setShowSettings(true)} className="w-full py-8 text-slate-300 flex items-center justify-center gap-2 group">
                                    <Icon name="lock" size={12} className="group-hover:text-blue-400" />
                                    <span className="text-[9px] font-bold uppercase tracking-widest">{isAuthorized ? 'ADMIN MODE ON' : 'ADMIN LOGIN'}</span>
                                </button>
                            </div>
                        )}
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 backdrop-blur-md bg-blue-900/30">
                            <div className="bg-white rounded-3xl p-8 max-w-xs w-full shadow-2xl border-t-8 border-blue-900">
                                <h3 className="font-black text-blue-900 uppercase text-center mb-1">Akses Admin</h3>
                                <p className="text-[9px] text-slate-400 font-bold text-center uppercase mb-6 tracking-widest">Masukkan Password</p>
                                <input type="password" placeholder="••••••" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-center outline-none mb-4 focus:border-blue-500" autoFocus />
                                <div className="flex gap-2">
                                    <button onClick={()=>setShowSettings(false)} className="flex-1 py-4 font-black text-[10px] text-slate-400 uppercase">Batal</button>
                                    <button onClick={checkPassword} className="flex-1 bg-blue-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-blue-200">Masuk</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {errorPopup && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-red-900/10 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl border-4 border-red-500 animate-shake">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="alert" size={32} />
                                </div>
                                <p className="text-[11px] font-black text-slate-600 uppercase leading-relaxed mb-6">{errorPopup}</p>
                                <button onClick={() => setErrorPopup(null)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase active:scale-95">MENGERTI</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
