<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Shift PLN UPT SURABAYA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .pln-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-premium { border-radius: 2.5rem; background: white; box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1); }
        .page-transition { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, deleteDoc, doc, getDocs, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, Timestamp, query, orderBy, getAuth, signInAnonymously, onAuthStateChanged, deleteDoc, doc, getDocs, where };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAG60SGFpT5PSqT0dA_D5Nv4Bg8YvkoBqY",
            authDomain: "monitoring-shift.firebaseapp.com",
            projectId: "monitoring-shift",
            storageBucket: "monitoring-shift.firebasestorage.app",
            messagingSenderId: "365268810773",
            appId: "1:365268810773:web:89b9937e9dd46d98c1e21c",
            measurementId: "G-BESPDSZH8S"
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>,
                zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
                wa: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.8 8.38 8.38 0 0 1 3.8.9L21 4.5l-1 4.5 1 2.5z"></path></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
                info: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
                alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [view, setView] = useState('form');
            const [user, setUser] = useState(null);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [notif, setNotif] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const dbRef = useRef(null);
            
            // Form States
            const [lokasi, setLokasi] = useState('');
            const [petugas, setPetugas] = useState('');
            const [whatsapp, setWhatsapp] = useState('');
            const [shift, setShift] = useState('');
            const [shiftLainnya, setShiftLainnya] = useState('');
            const [keterangan, setKeterangan] = useState('');
            const [foto, setFoto] = useState(null);
            const fileRef = useRef(null);

            const notify = (msg, type = "success") => {
                setNotif({ msg, type });
                setTimeout(() => setNotif(null), 4000);
            };

            const cleanupOldLogs = async (db) => {
                try {
                    const { collection, getDocs, deleteDoc, doc, Timestamp } = window.FB;
                    const fourteenDaysAgo = new Date();
                    fourteenDaysAgo.setDate(fourteenDaysAgo.getDate() - 14);
                    const tsThreshold = Timestamp.fromDate(fourteenDaysAgo);
                    const colRef = collection(db, "shift_logs");
                    const snap = await getDocs(colRef);
                    snap.forEach(async (d) => {
                        const data = d.data();
                        if (data.timestamp && data.timestamp.seconds < tsThreshold.seconds) {
                            await deleteDoc(doc(db, "shift_logs", d.id));
                        }
                    });
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) return;
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, query, orderBy, onSnapshot } = window.FB;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    dbRef.current = db;

                    await signInAnonymously(auth);

                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (u) {
                            cleanupOldLogs(db);
                            const colRef = collection(db, "shift_logs");
                            const q = query(colRef, orderBy("timestamp", "desc"));
                            onSnapshot(q, (snap) => {
                                setLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                            });
                        }
                    });
                };
                init();
            }, []);

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 1. Cek Format (Hanya Gambar)
                if (!file.type.startsWith('image/')) {
                    notify("Format file salah! Harus berupa gambar (JPG/PNG).", "error");
                    e.target.value = '';
                    return;
                }

                // 2. Cek Ukuran (Batas 15MB untuk file mentah sebelum kompresi)
                if (file.size > 15 * 1024 * 1024) {
                    notify("Ukuran foto terlalu besar (Max 15MB). Coba foto ulang.", "error");
                    e.target.value = '';
                    return;
                }

                try {
                    const compressed = await compressImage(file);
                    setFoto(compressed);
                } catch (err) {
                    notify("Gagal memproses gambar. Coba ganti foto lain.", "error");
                }
            };

            const compressImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onerror = () => reject();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                    reader.onerror = () => reject();
                });
            };

            const handleSubmit = async () => {
                const finalShift = shift === 'LAINNYA' ? shiftLainnya : shift;
                if (!lokasi || !petugas || !whatsapp || !finalShift || !foto) {
                    return notify("Lengkapi semua data & foto!", "error");
                }
                setLoading(true);
                try {
                    const { collection, addDoc, Timestamp } = window.FB;
                    await addDoc(collection(dbRef.current, "shift_logs"), {
                        lokasi: lokasi.toUpperCase().trim(),
                        petugas: petugas.toUpperCase().trim(),
                        wa: whatsapp,
                        shift: finalShift.toUpperCase(),
                        keterangan: keterangan.trim(),
                        foto: foto,
                        timestamp: Timestamp.now(),
                        uid: user.uid
                    });
                    setLokasi(''); setPetugas(''); setWhatsapp(''); setFoto(null); setShift(''); setShiftLainnya(''); setKeterangan('');
                    setView('active');
                    notify("Laporan Berhasil Terkirim!");
                } catch (e) { notify("Gagal mengirim laporan. Cek koneksi Anda.", "error"); }
                setLoading(false);
            };

            const openWA = (num, name, loc) => {
                let cleanNum = num.toString().startsWith('0') ? '62' + num.slice(1) : num;
                const msg = encodeURIComponent(`Halo Rekan *${name}*, mohon izin koordinasi untuk Shift di *GI ${loc}*...`);
                window.open(`https://wa.me/${cleanNum}?text=${msg}`, '_blank');
            };

            const filteredLogs = useMemo(() => {
                if (!searchTerm.trim()) return logs;
                const lowSearch = searchTerm.toLowerCase();
                return logs.filter(l => 
                    l.lokasi.toLowerCase().includes(lowSearch) || 
                    l.petugas.toLowerCase().includes(lowSearch) ||
                    l.shift.toLowerCase().includes(lowSearch)
                );
            }, [logs, searchTerm]);

            const latestPerGI = useMemo(() => {
                const map = new Map();
                filteredLogs.forEach(l => {
                    if (!map.has(l.lokasi)) map.set(l.lokasi, l);
                });
                return Array.from(map.values());
            }, [filteredLogs]);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative pb-20">
                    {/* Notification Overlay */}
                    {notif && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] px-6 py-4 rounded-3xl shadow-2xl text-white font-bold text-[11px] uppercase tracking-widest flex items-center gap-3 page-transition ${notif.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                            <Icon name={notif.type === 'success' ? 'zap' : 'alert'} size={18} />
                            <span className="leading-tight">{notif.msg}</span>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-white p-6 pb-8 rounded-b-[3rem] shadow-sm flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                             <div className="bg-[#F9D611] p-2.5 rounded-2xl shadow-md border-b-2 border-yellow-500">
                                <Icon name="zap" className="text-blue-900" size={24} />
                             </div>
                             <div>
                                <h1 className="font-extrabold text-3xl text-blue-900 tracking-tighter leading-none italic">PLN</h1>
                                <p className="text-[8px] font-bold text-blue-700 tracking-[0.3em] uppercase opacity-60">UPT SURABAYA</p>
                             </div>
                        </div>
                        <div className="text-right">
                            <h2 className="font-black text-blue-900 text-xs uppercase leading-none">MONITORING</h2>
                            <p className="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-tighter">ULTG SURABAYA UTARA</p>
                        </div>
                    </header>

                    {/* Nav */}
                    <nav className="flex bg-white/50 backdrop-blur-md mx-6 -mt-6 p-1.5 rounded-full shadow-lg border border-white z-40 sticky top-24">
                        {['form', 'active', 'history'].map((t) => (
                            <button 
                                key={t}
                                onClick={() => setView(t)}
                                className={`flex-1 py-3 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${view === t ? 'bg-blue-900 text-white shadow-md' : 'text-slate-400'}`}
                            >
                                {t === 'form' ? 'Lapor' : t === 'active' ? 'Petugas' : 'Riwayat'}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 px-6 pt-8">
                        {/* View: Form */}
                        {view === 'form' && (
                            <div className="card-premium p-8 page-transition space-y-6">
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Lokasi Gardu Induk</label>
                                        <input value={lokasi} onChange={e=>setLokasi(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase text-xs focus:bg-white focus:ring-2 focus:ring-blue-50 outline-none" placeholder="MISAL: GI SUKOLILO" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Shift Petugas</label>
                                        <select value={shift} onChange={e=>setShift(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none">
                                            <option value="">PILIH SHIFT</option>
                                            <option value="SHIFT 1 (07:00 - 15:00)">SHIFT 1 (PAGI)</option>
                                            <option value="SHIFT 2 (15:00 - 23:00)">SHIFT 2 (SORE)</option>
                                            <option value="SHIFT 3 (23:00 - 07:00)">SHIFT 3 (MALAM)</option>
                                            <option value="LAINNYA">LAINNYA / KHUSUS</option>
                                        </select>
                                    </div>
                                    {shift === 'LAINNYA' && (
                                        <input value={shiftLainnya} onChange={e=>setShiftLainnya(e.target.value)} className="w-full p-4 bg-blue-50 rounded-2xl font-bold uppercase text-xs outline-none" placeholder="Masukan Nama Shift" />
                                    )}
                                    <div className="space-y-1.5">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Nama Petugas On-Duty</label>
                                        <input value={petugas} onChange={e=>setPetugas(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-bold uppercase text-xs outline-none" placeholder="NAMA LENGKAP" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Nomor WhatsApp</label>
                                        <input value={whatsapp} type="tel" onChange={e=>setWhatsapp(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none" placeholder="08XXXXXXXXXX" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Keterangan (Opsional)</label>
                                        <input value={keterangan} onChange={e=>setKeterangan(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none" placeholder="Catatan tambahan jika ada..." />
                                    </div>
                                    <div className="pt-2">
                                        {!foto ? (
                                            <button onClick={()=>fileRef.current.click()} className="w-full py-10 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-slate-400 bg-slate-50 active:scale-95 transition-all">
                                                <Icon name="image" size={32} className="mb-2 opacity-50" />
                                                <span className="text-[9px] font-black uppercase tracking-widest">Lampirkan Foto Serah Terima</span>
                                                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                            </button>
                                        ) : (
                                            <div className="relative rounded-3xl overflow-hidden shadow-lg aspect-video bg-slate-100 group">
                                                <img src={foto} className="w-full h-full object-cover" />
                                                <button onClick={()=>setFoto(null)} className="absolute top-4 right-4 bg-rose-500 text-white p-2 rounded-xl shadow-lg active:scale-90 transition-all">
                                                    <Icon name="trash" size={16}/>
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={handleSubmit} disabled={loading} className="w-full pln-gradient text-white py-5 rounded-full font-black text-[10px] uppercase tracking-[0.3em] shadow-xl shadow-blue-900/20 active:scale-95 disabled:opacity-50 mt-4">
                                        {loading ? 'Mengirim...' : 'Kirim Laporan'}
                                    </button>

                                    {/* Instruksi Saran Tetap Ada */}
                                    <div className="mt-8 bg-amber-50 p-6 rounded-[2rem] border border-amber-100">
                                        <div className="flex items-center gap-2 mb-3 text-amber-700">
                                            <Icon name="alert" size={16} />
                                            <h4 className="text-[10px] font-black uppercase tracking-widest">Pusat Bantuan Upload</h4>
                                        </div>
                                        <ul className="space-y-3">
                                            <li className="flex gap-3 text-[9.5px] font-bold text-slate-600 leading-relaxed">
                                                <span className="text-amber-500 flex-shrink-0">⚠️</span>
                                                <span><strong>Error Resolusi:</strong> Jika muncul notifikasi ukuran terlalu besar, gunakan kamera HP langsung (bukan pilih dari galeri lama) atau turunkan setting megapixel kamera Anda.</span>
                                            </li>
                                            <li className="flex gap-3 text-[9.5px] font-bold text-slate-600 leading-relaxed">
                                                <span className="text-amber-500 flex-shrink-0">⚠️</span>
                                                <span><strong>Format Gambar:</strong> Pastikan file berakhiran .jpg, .jpeg, atau .png. File dokumen (PDF/WA Document) tidak akan diterima sistem.</span>
                                            </li>
                                            <li className="flex gap-3 text-[9.5px] font-bold text-slate-600 leading-relaxed">
                                                <span className="text-amber-500 flex-shrink-0">⚠️</span>
                                                <span><strong>Sinyal Lemah:</strong> Jika upload macet di tengah jalan, pindah ke area dengan sinyal lebih kuat dan tekan segarkan (refresh) halaman.</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* View: Active & History tetap sesuai aslinya */}
                        {view === 'active' && (
                            <div className="space-y-4 page-transition">
                                {latestPerGI.length === 0 ? (
                                    <div className="text-center py-20 text-slate-300 font-black uppercase text-[10px] tracking-widest">Belum ada data petugas</div>
                                ) : latestPerGI.map(l => (
                                    <div key={l.id} className="bg-white p-5 rounded-[2rem] shadow-sm flex items-center gap-5 border border-slate-50">
                                        <div className="relative">
                                            <img src={l.foto} className="w-20 h-20 rounded-2xl object-cover bg-slate-100 shadow-inner" />
                                            <div className="absolute -bottom-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-4 border-white"></div>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-[8px] font-black text-blue-900 uppercase tracking-tighter mb-1">{l.lokasi}</p>
                                            <h3 className="font-extrabold text-slate-800 uppercase truncate text-base leading-none tracking-tight">{l.petugas}</h3>
                                            <p className="text-[9px] font-bold text-slate-400 uppercase mt-2">{l.shift}</p>
                                        </div>
                                        <button onClick={()=>openWA(l.wa, l.petugas, l.lokasi)} className="p-4 bg-green-50 text-green-600 rounded-2xl active:scale-90 transition-all">
                                            <Icon name="wa" size={24} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-3 page-transition">
                                {filteredLogs.length === 0 ? (
                                    <div className="text-center py-20 text-slate-300 font-black uppercase text-[10px] tracking-widest">Data kosong</div>
                                ) : (
                                    <>
                                        {filteredLogs.map(l => (
                                            <div key={l.id} className="bg-white p-5 px-6 rounded-[2rem] border border-slate-50 shadow-sm">
                                                <div className="flex justify-between items-center">
                                                    <div className="min-w-0">
                                                        <p className="text-[8px] font-black text-blue-900 uppercase tracking-tighter mb-1">{l.lokasi} • {l.shift}</p>
                                                        <h4 className="font-bold text-sm text-slate-700 uppercase truncate">{l.petugas}</h4>
                                                        <p className="text-[8px] font-black text-slate-300 mt-2 uppercase">
                                                            {l.timestamp?.toDate().toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'})} | {l.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} WIB
                                                        </p>
                                                    </div>
                                                    <button onClick={()=>openWA(l.wa, l.petugas, l.lokasi)} className="text-green-500 bg-green-50 p-3 rounded-xl border border-green-100 shadow-sm"><Icon name="wa" size={18}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
